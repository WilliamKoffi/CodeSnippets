@if (workspace.support()) {
  <div class="fixed inset-0 z-[70] grid place-items-center bg-black/60 p-4" (click)="workspace.support.set(false)">
    <form class="w-full max-w-lg rounded-xl border border-outline-variant bg-surface p-6 shadow-2xl" (click)="$event.stopPropagation()" (ngSubmit)="submit()">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-xl font-bold">Support</h2>
          <p class="mt-1 text-sm text-on-surface-variant">Contactez l'équipe CodeSnippets.</p>
        </div>
        <button type="button" class="rounded-lg px-3 py-1 text-xl text-on-surface-variant hover:bg-surface-container" (click)="workspace.support.set(false)">×</button>
      </div>
      @if (sent()) {
        <p class="mt-4 rounded-lg border border-tertiary/40 bg-tertiary/10 p-3 text-sm text-tertiary">Ticket envoyé localement.</p>
      }
      <label class="mt-5 block text-[10px] font-mono font-bold uppercase text-on-surface-variant">Sujet</label>
      <input class="mt-1 w-full rounded-lg border border-outline-variant bg-surface-container-low px-3 py-2 text-sm outline-none focus:border-primary" [ngModel]="subject()" (ngModelChange)="subject.set($event)" name="subject" required />
      <label class="mt-4 block text-[10px] font-mono font-bold uppercase text-on-surface-variant">Message</label>
      <textarea rows="5" class="mt-1 w-full rounded-lg border border-outline-variant bg-surface-container-low px-3 py-2 text-sm outline-none focus:border-primary" [ngModel]="message()" (ngModelChange)="message.set($event)" name="message" required></textarea>
      <button class="mt-5 w-full rounded-lg bg-primary px-4 py-3 font-mono text-xs font-bold uppercase text-on-primary">Envoyer</button>
    </form>
  </div>
}
