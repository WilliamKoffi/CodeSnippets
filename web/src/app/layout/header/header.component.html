<header class="sticky top-0 z-50 border-b border-outline-variant/60 bg-surface/90 backdrop-blur-xl">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-8">
    <a routerLink="/snippets/feed" class="shrink-0">
      <app-logo />
    </a>

    <div class="hidden max-w-sm flex-1 md:block">
      <div class="relative">
        <input
          class="w-full rounded-full border border-outline-variant/50 bg-surface-container-low py-2 pl-4 pr-9 font-mono text-xs text-on-surface outline-none transition focus:border-primary"
          placeholder="Rechercher des bugs, solutions, tags..."
          [ngModel]="catalog.query()"
          (ngModelChange)="catalog.query.set($event)"
        />
        @if (catalog.query()) {
          <button class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-on-surface-variant cursor-pointer" (click)="catalog.query.set('')">×</button>
        }
      </div>
    </div>

    <div class="flex items-center gap-3">
      <a routerLink="/snippets/new" class="rounded-lg bg-primary px-4 py-2 font-mono text-xs font-bold text-on-primary shadow transition hover:bg-primary/95 cursor-pointer">
        Créer
      </a>
      <div class="h-9 w-9 overflow-hidden rounded-full border border-outline-variant">
        <img class="h-full w-full object-cover" [src]="session.active().avatar" [alt]="session.active().name" />
      </div>
    </div>
  </div>
</header>
